name: Build Check
on: [pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:stg
      - run: EXPECTED_ENV=STG pnpm verify
      - run: pnpm build:prod
      - run: EXPECTED_ENV=PROD pnpm verify
      - name: Verify dist files
        run: |
          test -f dist/index.html
          test -f dist/sitemap.xml
          test -f dist/robots.txt
          test -f dist/.build-manifest.json
